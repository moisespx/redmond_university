<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redmond University | Finish</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f4f1ee;
        --bg-accent: #efe6dd;
        --surface: rgba(255, 255, 255, 0.74);
        --surface-strong: rgba(255, 255, 255, 0.92);
        --ink: #2d2a2b;
        --muted: #53656b;
        --soft-muted: #80979d;
        --brand: #e23c30;
        --brand-dark: #bf2f25;
        --sand: #dca55c;
        --forest: #6e8f50;
        --navy: #234d7a;
        --plum: #7f3250;
        --shadow: 0 28px 70px rgba(66, 48, 35, 0.13);
        --shadow-strong: 0 36px 90px rgba(51, 29, 20, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Avenir Next", Avenir, "Trebuchet MS", sans-serif;
        color: var(--ink);
        background: #ffffff;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: none;
        pointer-events: none;
      }

      button,
      a {
        font: inherit;
      }

      .confetti-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 30;
      }

      .page {
        position: relative;
        min-height: 100vh;
        padding: 10px clamp(18px, 4vw, 48px) 20px;
        display: grid;
        grid-template-rows: 1fr auto;
        z-index: 1;
      }

      .hero {
        position: relative;
        display: grid;
        place-items: start center;
        align-content: start;
        min-height: 100vh;
        padding-top: 0;
      }

      .celebration {
        width: min(80vw, 1680px);
        max-width: 100%;
        text-align: center;
        margin-top: 0;
        padding-top: 0;
      }

      .celebration-card {
        position: relative;
        overflow: hidden;
        padding: 0;
        border-radius: 0;
        background: transparent;
        border: 0;
        box-shadow: none;
        backdrop-filter: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
      }

      .celebration-copy {
        width: 100%;
      }

      .celebration-hero {
        display: block;
        width: 80%;
        height: auto;
        margin: 0 auto;
      }

      .celebration-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: none;
        pointer-events: none;
      }

      .celebration h1 {
        position: relative;
        margin: 0;
        font-family: "Montserrat", "Avenir Next", sans-serif;
        font-size: clamp(2.8rem, 7vw, 5.8rem);
        line-height: 0.9;
        letter-spacing: -0.08em;
        text-transform: uppercase;
        color: var(--brand);
      }

      .celebration h2 {
        position: relative;
        max-width: 80%;
        margin: 10px auto 8px;
        color: var(--soft-muted);
        font-size: clamp(1.9rem, 4vw, 3.9rem);
        font-family: "Montserrat", "Avenir Next", sans-serif;
        font-weight: 800;
        line-height: 0.92;
        letter-spacing: -0.065em;
        text-transform: uppercase;
        text-wrap: balance;
      }

      .celebration .celebration-message {
        position: relative;
        max-width: 80%;
        margin: 0 auto;
        color: #2e292b;
        font-family: "Montserrat", "Avenir Next", sans-serif;
        font-size: clamp(1.25rem, 2.15vw, 2.15rem);
        font-weight: 500;
        line-height: 1.04;
        letter-spacing: -0.04em;
        text-transform: uppercase;
        text-wrap: balance;
      }

      .celebration p {
        position: relative;
        max-width: 80%;
        margin: 0 auto;
        color: var(--ink);
        font-size: clamp(0.95rem, 1.3vw, 1.12rem);
        line-height: 1.4;
        text-wrap: balance;
      }

      .celebration .celebration-note {
        max-width: 80%;
        margin-top: clamp(0.9rem, 1.8vw, 1.5rem);
        font-size: clamp(0.95rem, 1.3vw, 1.14rem);
        font-weight: 500;
        line-height: 1.34;
        letter-spacing: -0.025em;
        color: #2e292b;
      }

      .celebration .celebration-note + p {
        margin-top: clamp(0.8rem, 1.8vw, 1.3rem);
        color: #4e4a4c;
      }

      .celebration-actions {
        margin-top: clamp(1rem, 2vw, 1.8rem);
        position: relative;
        width: 100%;
        min-height: 88px;
        display: grid;
        place-items: center;
      }

      .celebration.is-playing .celebration-copy {
        display: none;
      }

      .celebration.is-playing .celebration-actions {
        margin-top: 0;
      }

      .celebration.is-playing .badge-strip {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .celebration-actions.is-playing {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 50%;
        width: min(calc(100vw - clamp(36px, 8vw, 96px)), 1200px);
        min-height: 0;
        transform: translateX(-50%);
        z-index: 20;
        pointer-events: none;
        overflow: hidden;
        background: #fff;
      }

      .celebration-actions > * {
        grid-area: 1 / 1;
      }

      .celebrate-button {
        position: relative;
        isolation: isolate;
        min-width: min(100%, 260px);
        padding: 15px 30px;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(135deg, #f15b46 0%, var(--brand) 38%, #c92e25 100%);
        box-shadow:
          0 18px 34px rgba(226, 60, 48, 0.22),
          0 0 0 0 rgba(226, 60, 48, 0.24);
        color: #fff8f3;
        cursor: pointer;
        transition:
          transform 180ms ease,
          box-shadow 180ms ease,
          filter 180ms ease;
        animation:
          buttonPulse 2.4s ease-out infinite,
          gradientShift 5.2s ease-in-out infinite;
        background-size: 180% 180%;
      }

      .celebrate-button:hover,
      .celebrate-button:focus-visible {
        transform: translateY(-3px) scale(1.02);
        box-shadow:
          0 24px 42px rgba(226, 60, 48, 0.28),
          0 0 0 8px rgba(226, 60, 48, 0.08);
        outline: none;
        filter: saturate(1.05);
      }

      .celebrate-button:active,
      .celebrate-button.is-bursting {
        transform: translateY(0) scale(0.985);
      }

      .celebrate-button__label {
        display: block;
        font-family: "Montserrat", "Avenir Next", sans-serif;
        font-size: clamp(0.98rem, 1.5vw, 1.14rem);
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .celebrate-explode {
        position: absolute;
        inset: 0;
        width: 80%;
        height: 80%;
        margin: auto;
        object-fit: contain;
        z-index: 0;
        opacity: 0;
        visibility: hidden;
        transform: scale(0.92);
        transition:
          opacity 160ms ease,
          transform 160ms ease,
          visibility 0s linear 160ms;
        pointer-events: none;
      }

      .celebration-actions.is-playing .celebrate-button {
        opacity: 0;
        visibility: hidden;
        transform: scale(0.96);
        pointer-events: none;
      }

      .celebration-actions.is-playing .celebrate-explode {
        opacity: 1;
        visibility: visible;
        transform: scale(0.92);
        object-fit: contain;
        object-position: center center;
        transition-delay: 0s;
      }

      .badge-strip {
        width: 100%;
        margin-top: clamp(1rem, 2vw, 1.8rem);
      }

      .badge-strip img {
        display: block;
        width: 80%;
        height: auto;
        margin: 0 auto;
      }

      @keyframes buttonPulse {
        0%,
        100% {
          box-shadow:
            0 20px 40px rgba(226, 60, 48, 0.26),
            0 0 0 0 rgba(226, 60, 48, 0.24);
        }
        70% {
          box-shadow:
            0 26px 52px rgba(226, 60, 48, 0.32),
            0 0 0 18px rgba(226, 60, 48, 0);
        }
      }

      @keyframes gradientShift {
        0%,
        100% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
      }

      @media (max-width: 760px) {
        .page {
          padding-top: 18px;
        }

        .hero {
          padding-top: 0;
        }

        .celebration {
          width: 100%;
        }

        .celebration h2,
        .celebration .celebration-message,
        .celebration p,
        .celebration .celebration-note {
          max-width: 100%;
        }

        .celebration-actions {
          width: 100%;
        }

        .celebration-actions.is-playing {
          width: min(calc(100vw - 24px), 1200px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <canvas class="confetti-canvas" id="confetti-canvas" aria-hidden="true"></canvas>
    <audio id="claps-audio" preload="auto" src="./claps.mp3"></audio>
    <audio id="finish-audio" preload="auto" src="./finish game.mp3"></audio>

    <main class="page">
      <section class="hero" aria-label="Course completion">
        <section class="celebration" id="celebration">
          <div class="celebration-card">
            <div class="celebration-copy">
              <img class="celebration-hero" src="./WeDidIt.jpg" alt="We did it" />
            </div>

            <div class="celebration-actions">
              <button class="celebrate-button" id="celebrate-button" type="button">
                <span class="celebrate-button__label">Celebrate</span>
              </button>
              <img
                class="celebrate-explode"
                id="celebrate-explode"
                data-phase-one-src="./Shaker-4.gif"
                data-phase-two-src="./RU-Badge-v6.gif"
                alt=""
                aria-hidden="true"
              />
            </div>

            <div class="badge-strip" aria-label="Redmond companies">
              <img
                src="./RU-Badge-v6.gif"
                alt="Redmond brands and celebration character"
              />
            </div>

          </div>
        </section>
      </section>
    </main>

    <script>
      (() => {
        const celebration = document.getElementById("celebration");
        const celebrateButton = document.getElementById("celebrate-button");
        const celebrationActions = document.querySelector(".celebration-actions");
        const celebrateExplode = document.getElementById("celebrate-explode");
        const confettiCanvas = document.getElementById("confetti-canvas");
        const confettiCtx = confettiCanvas ? confettiCanvas.getContext("2d") : null;
        const clapsAudio = document.getElementById("claps-audio");
        const finishAudio = document.getElementById("finish-audio");
        const celebrationPhaseDurationMs = 5000;
        const celebrationDurationMs = celebrationPhaseDurationMs * 2;
        let confettiParticles = [];
        let confettiFrame = 0;
        let confettiUntil = 0;
        let lastConfettiSpawn = 0;
        let celebrationAudioTimer = 0;
        let celebrationFadeStartTimer = 0;
        let celebrationFadeTimer = 0;
        let celebrationUiTimer = 0;
        let celebrationPhaseTimer = 0;

        function resizeConfettiCanvas() {
          if (!confettiCanvas || !confettiCtx) return;
          const dpr = window.devicePixelRatio || 1;
          const width = window.innerWidth;
          const height = window.innerHeight;
          confettiCanvas.width = Math.floor(width * dpr);
          confettiCanvas.height = Math.floor(height * dpr);
          confettiCanvas.style.width = `${width}px`;
          confettiCanvas.style.height = `${height}px`;
          confettiCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function createConfettiPiece(width, height) {
          const palette = [
            "#e23c30",
            "#f0bf68",
            "#7e9a58",
            "#234d7a",
            "#8a9ea3",
            "#f7f2ea",
            "#7f3250",
          ];

          return {
            x: Math.random() * width,
            y: -20 - Math.random() * height * 0.24,
            w: 6 + Math.random() * 10,
            h: 10 + Math.random() * 14,
            vx: (Math.random() - 0.5) * 2.8,
            vy: 2.8 + Math.random() * 4.2,
            gravity: 0.045 + Math.random() * 0.025,
            rotation: Math.random() * Math.PI,
            vr: (Math.random() - 0.5) * 0.24,
            tilt: Math.random() * Math.PI,
            color: palette[Math.floor(Math.random() * palette.length)],
            opacity: 1,
            decay: 0.002 + Math.random() * 0.0022,
          };
        }

        function spawnConfettiBatch(count) {
          const width = window.innerWidth;
          const height = window.innerHeight;
          for (let i = 0; i < count; i += 1) {
            confettiParticles.push(createConfettiPiece(width, height));
          }
        }

        function stopConfetti() {
          if (confettiFrame) {
            cancelAnimationFrame(confettiFrame);
            confettiFrame = 0;
          }
          confettiUntil = 0;
          confettiParticles = [];
          if (confettiCtx) {
            confettiCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
          }
        }

        function animateConfetti(timestamp) {
          if (!confettiCtx) return;
          const width = window.innerWidth;
          const height = window.innerHeight;

          if (timestamp < confettiUntil && timestamp - lastConfettiSpawn > 85) {
            spawnConfettiBatch(Math.max(10, Math.floor(width / 120)));
            lastConfettiSpawn = timestamp;
          }

          confettiCtx.clearRect(0, 0, width, height);
          confettiParticles = confettiParticles.filter((piece) => {
            piece.vy += piece.gravity;
            piece.x += piece.vx;
            piece.y += piece.vy;
            piece.rotation += piece.vr;
            piece.tilt += 0.16;
            piece.opacity -= piece.decay;

            if (piece.opacity <= 0 || piece.y > height + 60) {
              return false;
            }

            confettiCtx.save();
            confettiCtx.globalAlpha = Math.max(piece.opacity, 0);
            confettiCtx.translate(piece.x, piece.y);
            confettiCtx.rotate(piece.rotation);
            confettiCtx.scale(Math.cos(piece.tilt), 1);
            confettiCtx.fillStyle = piece.color;
            confettiCtx.fillRect(-piece.w / 2, -piece.h / 2, piece.w, piece.h);
            confettiCtx.restore();
            return true;
          });

          if (timestamp < confettiUntil || confettiParticles.length) {
            confettiFrame = requestAnimationFrame(animateConfetti);
          } else {
            stopConfetti();
          }
        }

        function startConfetti(durationMs) {
          if (!confettiCtx) return;
          stopConfetti();
          resizeConfettiCanvas();
          confettiUntil = performance.now() + durationMs;
          lastConfettiSpawn = 0;
          spawnConfettiBatch(Math.max(90, Math.floor(window.innerWidth / 8)));
          confettiFrame = requestAnimationFrame(animateConfetti);
        }

        function stopApplause() {
          if (celebrationAudioTimer) {
            window.clearTimeout(celebrationAudioTimer);
            celebrationAudioTimer = 0;
          }
          if (celebrationFadeStartTimer) {
            window.clearTimeout(celebrationFadeStartTimer);
            celebrationFadeStartTimer = 0;
          }
          if (celebrationFadeTimer) {
            window.clearInterval(celebrationFadeTimer);
            celebrationFadeTimer = 0;
          }

          [clapsAudio, finishAudio].forEach((audio) => {
            if (!audio) return;
            audio.pause();
            audio.currentTime = 0;
            audio.volume = 1;
            audio.loop = false;
          });
        }

        function stopCelebrationVisual() {
          if (celebrationUiTimer) {
            window.clearTimeout(celebrationUiTimer);
            celebrationUiTimer = 0;
          }
          if (celebrationPhaseTimer) {
            window.clearTimeout(celebrationPhaseTimer);
            celebrationPhaseTimer = 0;
          }

          celebrateButton.disabled = false;
          celebration.classList.remove("is-playing");
          celebrationActions.classList.remove("is-playing");

          if (celebrateExplode) {
            celebrateExplode.removeAttribute("src");
          }
        }

        function startCelebrationVisual(durationMs) {
          if (!celebrationActions) return;

          if (celebrationUiTimer) {
            window.clearTimeout(celebrationUiTimer);
            celebrationUiTimer = 0;
          }
          if (celebrationPhaseTimer) {
            window.clearTimeout(celebrationPhaseTimer);
            celebrationPhaseTimer = 0;
          }

          celebrateButton.disabled = true;
          celebration.classList.add("is-playing");
          celebrationActions.classList.add("is-playing");

          if (celebrateExplode) {
            const phaseOneSrc = celebrateExplode.dataset.phaseOneSrc;
            const phaseTwoSrc = celebrateExplode.dataset.phaseTwoSrc;
            celebrateExplode.removeAttribute("src");
            requestAnimationFrame(() => {
              if (phaseOneSrc) {
                celebrateExplode.setAttribute("src", phaseOneSrc);
              }
            });

            if (phaseTwoSrc) {
              celebrationPhaseTimer = window.setTimeout(() => {
                celebrateExplode.removeAttribute("src");
                requestAnimationFrame(() => {
                  celebrateExplode.setAttribute("src", phaseTwoSrc);
                });
              }, celebrationPhaseDurationMs);
            }
          }

          celebrationUiTimer = window.setTimeout(() => {
            stopCelebrationVisual();
          }, durationMs);
        }

        async function startApplause(durationMs) {
          stopApplause();

          if (!clapsAudio || !finishAudio) return;

          const clapsStartVolume = 0.95;
          const finishStartVolume = 0.8;
          const fadeDurationMs = Math.min(2200, Math.max(1400, Math.floor(durationMs * 0.3)));
          const fadeStartMs = Math.max(0, durationMs - fadeDurationMs);

          clapsAudio.currentTime = 0;
          finishAudio.currentTime = 0;
          clapsAudio.volume = clapsStartVolume;
          finishAudio.volume = finishStartVolume;
          clapsAudio.loop = true;
          finishAudio.loop = true;

          await Promise.allSettled([clapsAudio.play(), finishAudio.play()]);

          celebrationFadeStartTimer = window.setTimeout(() => {
            const fadeStart = performance.now();
            celebrationFadeTimer = window.setInterval(() => {
              const elapsed = performance.now() - fadeStart;
              const progress = Math.min(elapsed / fadeDurationMs, 1);
              const nextLevel = 1 - progress;

              clapsAudio.volume = Math.max(0, clapsStartVolume * nextLevel);
              finishAudio.volume = Math.max(0, finishStartVolume * nextLevel);

              if (progress >= 1) {
                window.clearInterval(celebrationFadeTimer);
                celebrationFadeTimer = 0;
              }
            }, 80);
          }, fadeStartMs);

          celebrationAudioTimer = window.setTimeout(() => {
            stopApplause();
          }, durationMs);
        }

        if (celebrateButton) {
          celebrateButton.addEventListener("click", () => {
            if (celebrateButton.disabled) return;

            startCelebrationVisual(celebrationDurationMs);
            startConfetti(celebrationDurationMs);
            startApplause(celebrationDurationMs).catch(() => {});
          });
        }

        window.addEventListener("resize", resizeConfettiCanvas, { passive: true });
        window.addEventListener("pagehide", () => {
          stopConfetti();
          stopApplause();
          stopCelebrationVisual();
        });

        resizeConfettiCanvas();
      })();
    </script>
  </body>
</html>

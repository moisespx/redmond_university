<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Why Who What Flip Cards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #1f2933;
        --page: #f6f6f6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 100%;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 18px 18px;
        color: var(--ink);
        font-family: "Avenir", "Avenir Next", "Helvetica Neue", sans-serif;
      }

      .stage {
        width: min(100%, 1200px);
        max-width: 1200px;
        display: flex;
        flex-direction: column;
        gap: 32px;
      }

      .flip-card {
        position: relative;
        width: 100%;
        border: 0;
        padding: 0;
        background: transparent;
        cursor: pointer;
        font-family: "Montserrat", "Avenir", "Helvetica Neue", sans-serif;
        text-align: left;
        perspective: 1400px;
        outline: none;
      }

      .flip-inner {
        display: block;
        position: relative;
        width: 100%;
        min-height: 220px;
        border-radius: 24px;
        transform-style: preserve-3d;
        transition: transform 0.72s cubic-bezier(0.22, 1, 0.36, 1);
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.2);
      }

      .flip-card:hover .flip-inner,
      .flip-card:focus-visible .flip-inner {
        transform: translateY(-4px);
        box-shadow: 0 24px 48px rgba(15, 23, 42, 0.24);
      }

      .flip-card.is-open .flip-inner {
        transform: rotateY(180deg);
      }

      .flip-card.is-open:hover .flip-inner,
      .flip-card.is-open:focus-visible .flip-inner {
        transform: rotateY(180deg) translateY(-2px);
      }

      .card-face {
        position: absolute;
        inset: 0;
        border-radius: 24px;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        border: 1px solid var(--card-border, rgba(255, 255, 255, 0.34));
        overflow: hidden;
      }

      .card-front {
        display: grid;
        place-items: center;
        background: linear-gradient(90deg, rgba(255, 255, 255, 0.05), rgba(0, 0, 0, 0.12)),
          var(--card-fill, #2e3d2c);
      }

      .card-front::after {
        content: "";
        position: absolute;
        inset: 10px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.34);
        pointer-events: none;
      }

      .front-word {
        margin: 0;
        font-size: clamp(1.8rem, 5vw, 3.15rem);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #fdf8f0;
        text-shadow: 0 8px 20px rgba(15, 23, 42, 0.35);
      }

      .front-hint {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: 12px;
        font-size: 0.75rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(253, 248, 240, 0.85);
        white-space: nowrap;
      }

      .card-back {
        transform: rotateY(180deg);
        padding: 20px 22px;
        background: linear-gradient(150deg, rgba(18, 20, 24, 0.08), rgba(18, 20, 24, 0.4)),
          var(--card-fill, #2e3d2c);
        color: #fdf8f0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 10px;
        text-align: center;
      }

      .back-title {
        margin: 0;
        font-family: "Montserrat", "Avenir", "Helvetica Neue", sans-serif;
        font-size: clamp(1.15rem, 2.5vw, 1.6rem);
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .back-text {
        margin: 0;
        font-family: "Avenir", "Avenir Next", "Helvetica Neue", sans-serif;
        font-size: 16px;
        line-height: 1.4;
        width: 100%;
        overflow: visible;
        text-wrap: pretty;
      }

      .flip-card:focus-visible {
        outline: 3px solid rgba(31, 41, 51, 0.45);
        outline-offset: 5px;
        border-radius: 24px;
      }

      @media (max-width: 760px) {
        .stage {
          width: 100%;
          gap: 32px;
        }

        .flip-inner {
          min-height: 240px;
          border-radius: 20px;
        }

        .card-face {
          border-radius: 20px;
        }

        .card-front::after {
          border-radius: 15px;
        }

        .card-back {
          padding: 16px 16px 14px;
        }

        .back-text {
          font-size: 16px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .flip-inner {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <section class="stage" aria-label="Why who what cards">
      <button
        class="flip-card"
        data-card-key="why"
        type="button"
        aria-pressed="false"
        style="--card-fill: #2e3d2c; --card-border: rgba(223, 235, 218, 0.35)"
      >
        <div class="flip-inner">
          <div class="card-face card-front">
            <span class="front-word">Why</span>
          </div>
          <div class="card-face card-back">
            <h2 class="back-title">Why</h2>
            <p class="back-text">
              Redmond Farm Markets exist to provide our customers with nourishing foods, products
              from the Heritage Farm, and items from local suppliers. They also serve as hubs for
              building communities of like-minded individuals who believe in the mission of
              elevating the human experience.
            </p>
          </div>
        </div>
      </button>

      <button
        class="flip-card"
        data-card-key="who"
        type="button"
        aria-pressed="false"
        style="--card-fill: #d29832; --card-border: rgba(255, 238, 200, 0.35)"
      >
        <div class="flip-inner">
          <div class="card-face card-front">
            <span class="front-word">Who</span>
          </div>
          <div class="card-face card-back">
            <h2 class="back-title">Who</h2>
            <p class="back-text">
              Many people are involved in the operation and success of the Farm Markets. Each
              market has a team of associates who run the stores on a day-to-day basis. Other
              associates focus on product buying and ordering, store development, culture, and
              management. And of course, we can't forget our amazing customers! The Farm Markets
              are happy to serve northern Utah communities and bring high-quality foods and
              products to everyone.
            </p>
          </div>
        </div>
      </button>

      <button
        class="flip-card"
        data-card-key="what"
        type="button"
        aria-pressed="false"
        style="--card-fill: #b9beaf; --card-border: rgba(246, 247, 241, 0.42)"
      >
        <div class="flip-inner">
          <div class="card-face card-front">
            <span class="front-word">What</span>
          </div>
          <div class="card-face card-back">
            <h2 class="back-title">What</h2>
            <p class="back-text">
              Redmond Markets serve our communities by connecting people with our farm-raised
              staples, House Made creations, and products from thoughtful artisans and farmers who
              share our values.
            </p>
          </div>
        </div>
      </button>
    </section>

    <script>
      (function () {
        const DATA_URL = "ellipse-why-presets.json";
        const DEFAULT_PRESET_KEY = "farm-markets";
        const ORDERED_KEYS = ["why", "who", "what"];
        const PRESET_ALIASES = {
          market: "farm-markets",
          markets: "farm-markets",
          "farm-market": "farm-markets",
          "farm-markets": "farm-markets",
          kitchen: "farm-kitchen",
          "farm-kitchen": "farm-kitchen",
          production: "production-kitchen",
          "production-kitchen": "production-kitchen",
          "redmond-production-kitchen": "production-kitchen",
          truck: "farm-market-truck",
          "market-truck": "farm-market-truck",
          "farm-market-truck": "farm-market-truck",
          freight: "freight-trucks",
          "freight-truck": "freight-trucks",
          "freight-trucks": "freight-trucks",
          "redmond-freight-trucks": "freight-trucks",
        };

        const stage = document.querySelector(".stage");
        const cards = Array.from(document.querySelectorAll(".flip-card"));
        const compactViewport = window.matchMedia("(max-width: 760px)");

        function normalizeParamString(raw) {
          return String(raw || "")
            .replace(/^\?/, "")
            .replace(/^#/, "")
            .replace(/&amp;/gi, "&")
            .replace(/;/g, "&");
        }

        const normalizedSearch = normalizeParamString(window.location.search);
        const normalizedHash = normalizeParamString(window.location.hash);
        const combinedParams = [normalizedSearch, normalizedHash].filter(Boolean).join("&");
        const rawParams = new URLSearchParams(combinedParams);
        const params = new URLSearchParams();

        for (const [key, value] of rawParams.entries()) {
          let normalizedKey = String(key);
          while (normalizedKey.toLowerCase().startsWith("amp;")) {
            normalizedKey = normalizedKey.slice(4);
          }
          if (!params.has(normalizedKey)) params.set(normalizedKey, value);
        }

        const toTitle = (value) => value.charAt(0).toUpperCase() + value.slice(1);

        function normalizePresetKey(rawKey) {
          const normalized = String(rawKey || "").trim().toLowerCase();
          if (!normalized) return DEFAULT_PRESET_KEY;
          return PRESET_ALIASES[normalized] || normalized;
        }

        function getRequestedPresetKey() {
          return normalizePresetKey(
            params.get("preset") ||
              params.get("variant") ||
              params.get("copy") ||
              params.get("key") ||
              DEFAULT_PRESET_KEY,
          );
        }

        function normalizePreset(rawPreset) {
          if (!rawPreset || typeof rawPreset !== "object") return null;

          const sourceCards =
            rawPreset.cards && typeof rawPreset.cards === "object" ? rawPreset.cards : rawPreset;
          const cardsByKey = {};

          for (const cardKey of ORDERED_KEYS) {
            const rawCard = sourceCards?.[cardKey];
            if (!rawCard || typeof rawCard !== "object") return null;
            if (typeof rawCard.text !== "string" || !rawCard.text.trim()) return null;

            cardsByKey[cardKey] = {
              title:
                typeof rawCard.title === "string" && rawCard.title.trim()
                  ? rawCard.title.trim()
                  : toTitle(cardKey),
              text: rawCard.text.trim(),
            };
          }

          return {
            name: typeof rawPreset.name === "string" ? rawPreset.name.trim() : "",
            cards: cardsByKey,
          };
        }

        function applyPreset(preset) {
          if (!preset) return;

          if (preset.name && stage) {
            stage.setAttribute("aria-label", `${preset.name} why who what cards`);
          }

          cards.forEach((card) => {
            const cardKey = card.getAttribute("data-card-key");
            const cardData = preset.cards?.[cardKey];
            if (!cardKey || !cardData) return;

            const title = card.querySelector(".back-title");
            const text = card.querySelector(".back-text");

            if (title) title.textContent = cardData.title;
            if (text) text.textContent = cardData.text;
          });
        }

        async function fetchPreset(key) {
          try {
            const response = await fetch(DATA_URL, { cache: "no-store" });
            if (!response.ok) return null;
            const presets = await response.json();
            return normalizePreset(presets?.[key]);
          } catch (error) {
            console.warn("Unable to load ellipse why presets.", error);
            return null;
          }
        }

        const syncCardHeights = () => {
          let tallestHeight = 0;
          const minimumHeight = compactViewport.matches ? 240 : 220;

          cards.forEach((card) => {
            const inner = card.querySelector(".flip-inner");

            if (inner) inner.style.height = "";
          });

          cards.forEach((card) => {
            const inner = card.querySelector(".flip-inner");
            const back = card.querySelector(".card-back");
            const title = card.querySelector(".back-title");
            const text = card.querySelector(".back-text");

            if (!inner || !back || !title || !text) return;

            const backStyles = window.getComputedStyle(back);
            const paddingTop = parseFloat(backStyles.paddingTop) || 0;
            const paddingBottom = parseFloat(backStyles.paddingBottom) || 0;
            const gap = parseFloat(backStyles.gap) || 0;
            const contentHeight =
              paddingTop +
              paddingBottom +
              gap +
              title.getBoundingClientRect().height +
              text.scrollHeight +
              8;

            tallestHeight = Math.max(tallestHeight, minimumHeight, contentHeight);
          });

          const sharedHeight = Math.ceil(tallestHeight);

          cards.forEach((card) => {
            const inner = card.querySelector(".flip-inner");

            if (inner) inner.style.height = `${sharedHeight}px`;
          });
        };

        let resizeFrame = 0;
        const scheduleHeightSync = () => {
          window.cancelAnimationFrame(resizeFrame);
          resizeFrame = window.requestAnimationFrame(syncCardHeights);
        };

        const closeAll = () => {
          cards.forEach((card) => {
            card.classList.remove("is-open");
            card.setAttribute("aria-pressed", "false");
          });
        };

        cards.forEach((card) => {
          card.addEventListener("click", () => {
            const isOpen = card.classList.toggle("is-open");
            card.setAttribute("aria-pressed", isOpen ? "true" : "false");
          });
        });

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") closeAll();
        });

        scheduleHeightSync();
        window.addEventListener("load", scheduleHeightSync);
        window.addEventListener("resize", scheduleHeightSync);
        compactViewport.addEventListener("change", scheduleHeightSync);

        if (document.fonts?.ready) {
          document.fonts.ready.then(scheduleHeightSync);
        }

        (async function initializeContent() {
          const presetKey = getRequestedPresetKey();
          const preset = await fetchPreset(presetKey);

          if (preset) {
            applyPreset(preset);
            scheduleHeightSync();
            return;
          }

          if (presetKey !== DEFAULT_PRESET_KEY) {
            console.warn(`Preset "${presetKey}" not found in ${DATA_URL}.`);
          }
        })();
      })();
    </script>
  </body>
</html>

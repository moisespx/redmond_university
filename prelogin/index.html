<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redmond University | Login Options</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="prelogin-shell">
      <div class="locale-wrap">
        <div class="locale-switch" role="group" aria-label="Language selector">
          <a id="lang-en" href="?lang=en" data-lang="en">EN</a>
          <a id="lang-es" href="?lang=es" data-lang="es">ES</a>
        </div>
      </div>

      <section class="hero-banner" aria-label="Classroom banner">
        <img src="./imgs/banner.png" alt="Team training session" />
      </section>

      <section class="options-grid" aria-label="Choose login type">
        <article class="login-card">
          <div class="icon-wrap" aria-hidden="true">
            <img src="./imgs/building.svg" alt="" />
          </div>
          <h2 data-i18n="redmondTitle">Redmond Login</h2>
          <p data-i18n="redmondBody">For internal team members and employees.</p>
          <a
            class="continue-btn"
            href="https://example.com/redmond-login"
            target="_top"
            rel="noopener noreferrer"
            data-i18n="continue"
            >Continue <span aria-hidden="true">-></span></a
          >
        </article>

        <article class="login-card">
          <div class="icon-wrap" aria-hidden="true">
            <img src="./imgs/people.svg" alt="" />
          </div>
          <h2 data-i18n="affiliateTitle">Affiliate Login</h2>
          <p data-i18n="affiliateBody">For partners and affiliates.</p>
          <a
            class="continue-btn"
            href="https://example.com/affiliate-login"
            target="_top"
            rel="noopener noreferrer"
            data-i18n="continue"
            >Continue <span aria-hidden="true">-></span></a
          >
        </article>
      </section>

      <footer class="brand-footer" aria-label="Redmond University logo">
        <img src="./imgs/logo.svg" alt="Redmond University" />
      </footer>
    </main>

    <script>
      (function () {
        const translations = {
          en: {
            pageTitle: "Redmond University | Login Options",
            redmondTitle: "Redmond Login",
            redmondBody: "For internal team members and employees.",
            affiliateTitle: "Affiliate Login",
            affiliateBody: "For partners and affiliates.",
            continue: "Continue",
          },
          es: {
            pageTitle: "Redmond University | Login Options",
            redmondTitle: "Acceso Redmond",
            redmondBody: "Para miembros internos del equipo y empleados.",
            affiliateTitle: "Acceso de Afiliados",
            affiliateBody: "Para socios y afiliados.",
            continue: "Continuar",
          },
        };

        const url = new URL(window.location.href);
        const requestedLang = (url.searchParams.get("lang") || "").toLowerCase();
        const lang = requestedLang === "es" || requestedLang === "en" ? requestedLang : "en";
        const dictionary = translations[lang];

        document.documentElement.lang = lang;
        document.title = dictionary.pageTitle;

        document.querySelectorAll("[data-i18n]").forEach((element) => {
          const key = element.dataset.i18n;
          if (!dictionary[key]) return;
          if (element.classList.contains("continue-btn")) {
            element.innerHTML = `${dictionary[key]} <span aria-hidden="true">-></span>`;
            return;
          }
          element.textContent = dictionary[key];
        });

        ["en", "es"].forEach((code) => {
          const link = document.getElementById(`lang-${code}`);
          if (!link) return;
          const next = new URL(window.location.href);
          next.searchParams.set("lang", code);
          link.href = `${next.pathname}${next.search}${next.hash}`;
          link.classList.toggle("active", code === lang);
        });
      })();
    </script>
  </body>
</html>
